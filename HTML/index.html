<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <form action="">
        <div class="campo-formulario">
            <label for="inome">Nome:</label>
            <input type="text" name="Nome" id="inome">
        </div>
        
        <div class="campo-formulario">
            <label for="iTelefone">Telefone:</label> 
            <input type="tel" name="Telefone" id="iTelefone">
        </div>
        <div class="campo-formulario">
            <label for="iEndereco">Endereco:</label>
            <input type="text" name="Endereco" id="iEndereco">
        </div>
        
        <div class="campo-formulario">
            <label for="iEmail">Email:</label>
            <input type="email" name="Email" id="iEmail">
        </div>
        <div class="campo-formulario">
            <label for="inascimento">nascimento:</label>
            <input type="date" name="nascimento" id="inascimento">
        </div>
        <input type="submit" value="Enviar">
    </form>

    <div>
        <label for="busca">Pesquisar:</label>
        <input type="text" id="busca">
    </div>

    <button id="btn-alfabetica">Ordem Alfabetica</button>

    <button id="btn-criacao">Ordem de criacao</button>
    
    <button id="btn-numerica">Ordem numerica</button>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Endereco</th>
                <th>Email</th>
                <th>data de nascimento</th>
                <th>Acoes</th>
            </tr>
        </thead>

        <tbody id="tabela-contatos"></tbody>
    </table>

    <script src="../js/script.js" ></script>
</body>
</html>
