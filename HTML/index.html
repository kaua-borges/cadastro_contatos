<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Contatos</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

    <div class="caixa-menu">
        <section id="tela-menu">
            <h1>Agenda de Contatos</h1>
            <p class="subtitulo-menu">o que deseja fazer com o Contato:</p>
            <button id="btn-cadastro" class="btn-menu">Cadastrar</button>
            <button id="btn-listar" class="btn-menu">Visualizar</button>
            <button id="btn-alterar" class="btn-menu">Alterar</button>
        </section>
    </div>

    <section id="tela-cadastro">
        <h2>Cadastro / Alteração de Contato</h2>
        <form id="form-contato" action="">
            <div class="campo-formulario">
                <label for="inome">Nome:</label>
                <input type="text" name="Nome" id="inome" required>
            </div>
            
            <div class="campo-formulario">
                <label for="iTelefone">Telefone:</label> 
                <input type="tel" name="Telefone" id="iTelefone" required>
            </div>
            <div class="campo-formulario">
                <label for="iEndereco">Endereco:</label>
                <input type="text" name="Endereco" id="iEndereco">
            </div>
            
            <div class="campo-formulario">
                <label for="iEmail">Email:</label>
                <input type="email" name="Email" id="iEmail">
            </div>
            <div class="campo-formulario">
                <label for="inascimento">nascimento:</label>
                <input type="date" name="nascimento" id="inascimento">
            </div>
            
            <div class="grupo-botoes-form">
                <input type="submit" id="btn-enviar" value="Enviar" class="btn-primario">
                <button type="button" id="btn-voltar-cadastro" class="btn-secundario">Voltar</button>
            </div>
        </form>
    </section>
    
    <section id="tela-listagem">
        <h2 id="titulo-listagem">Listagem de Contatos</h2>
        <div class="barra-pesquisa">
            <label for="busca">Pesquisar:</label>
            <input type="text" id="busca" placeholder="Digite nome ou telefone...">
            <button type="button" id="btn-voltar-listagem" class="btn-secundario-pequeno">Voltar ao Menu</button>
        </div>

        <div class="box-button grupo-ordenacao">
            <button id="btn-alfabetica" class="btn-ordenacao">Ordem Alfabetica</button>
            <button id="btn-criacao" class="btn-ordenacao">Ordem de criacao</button>
            <button id="btn-numerica" class="btn-ordenacao">Ordem numerica</button>
        </div>
        
        <table class="tabela-custom">
            <thead>
                <tr id="cabecalho-tabela">
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Endereco</th>
                    <th>Email</th>
                    <th>data de nascimento</th>
                </tr>
            </thead>
            <tbody id="tabela-contatos"></tbody>
        </table>
    </section>

    <div id="caixa-modal" class="modal-overlay">
        <div class="modal-conteudo">
            <p id="modal-mensagem">Mensagem aqui</p>
            <div id="modal-botoes" class="modal-botoes"></div>
        </div>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
