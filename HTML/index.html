<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="inome">Nome:</label>
            <input type="text" name="Nome" id="inome">
        <p><label for="iTelefone">Telefone:</label> 
            <input type="tel" name="Telefone" id="iTelefone"></p>
        <p><label for="iEndereco">Endereco:</label>
            <input type="text" name="Endereco" id="iEndereco"></p>
        <p><label for="iEmail">Email:</label>
            <input type="email" name="Email" id="iEmail"></p>
        <p><label for="inascimento">nascimento:</label>
            <input type="date" name="nascimento" id="inascimento"></p>
        <p><input type="submit" value="Enviar"></p>
    </form>

    <div>
        <label for="busca">Pesquisar:</label>
        <input type="text" id="busca">
    </div>

    <button id="btn-alfabetica">Ordem Alfabetica</button>

    <button id="btn-criacao">Ordem de criacao</button>
    
    <button id="btn-numerica">Ordem numerica</button>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Endereco</th>
                <th>Email</th>
                <th>data de nascimento</th>
                <th>Acoes</th>
            </tr>
        </thead>

        <tbody id="tabela-contatos"></tbody>
    </table>
</body>
</html>
